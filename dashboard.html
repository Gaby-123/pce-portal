<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PCE Portal — Dashboard</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #f8fafc;
      font-family: 'Segoe UI', sans-serif;
      overflow-x: hidden;
      min-height: 100vh;
    }

    /* ── NAVBAR ── */
    .user-profile-corner { display: flex; align-items: center; gap: 10px; }

    .user-initials {
      background: white !important;
      color: #0d6efd !important;
      width: 35px; height: 35px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-weight: bold;
      border: 1px solid rgba(0,0,0,0.1);
      flex-shrink: 0;
    }

    .custom-logout-btn {
      background-color: white !important;
      color: #dc3545 !important;
      border: 1px solid #dc3545 !important;
      transition: all 0.3s ease;
    }
    .custom-logout-btn:hover {
      background-color: #dc3545 !important;
      color: white !important;
      box-shadow: 0 4px 8px rgba(0,0,0,0.2);
    }

    /* ── CONTENT AREA ── */
    #content {
      width: 100%;
      min-height: calc(100vh - 62px);
    }

    /* ── LOADING SCREEN ── */
    #loadingScreen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: calc(100vh - 62px);
      gap: 16px;
    }
    #loadingScreen .spinner-border {
      width: 3rem; height: 3rem;
      color: #0d6efd;
    }
    #loadingScreen p {
      color: #6b7280;
      font-size: 0.95rem;
    }

    /* ── ACCESS DENIED ── */
    #accessDenied {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: calc(100vh - 62px);
      gap: 12px;
      text-align: center;
      padding: 40px;
    }

    .hidden { display: none !important; }

    @media (max-width: 576px) {
      .navbar-brand img { width: 30px; height: 30px; }
    }
  </style>
</head>
<body>

  <!-- ── NAVBAR ── -->
  <nav class="navbar navbar-dark bg-primary" id="mainNav"
       style="border-bottom: 3px solid #0a58ca;">
    <div class="container-fluid px-3 px-sm-4">

      <a class="navbar-brand d-flex align-items-center" href="#"
         style="gap: 10px; max-width: 70%;">
        <img src="https://pce.edu.gh/newimg/logo.png" alt="PCE Logo"
             width="38" height="38"
             style="background:white;padding:2px;border-radius:4px;flex-shrink:0;">
        <div class="d-flex flex-column" style="line-height:1.1;overflow:hidden;">
          <span class="fw-bold d-none d-sm-inline" style="font-size:0.9rem;">
            PRESBYTERIAN COLLEGE OF EDUCATION
          </span>
          <span class="fw-bold d-inline d-sm-none" style="font-size:0.85rem;">
            PCE AKROPONG
          </span>
          <small class="text-white-50" style="font-size:0.7rem;">AKROPONG-AKUAPEM</small>
        </div>
      </a>

      <div class="user-profile-corner" id="userCorner">
        <div class="text-end d-none d-sm-block">
          <div id="userNameDisplay" class="text-white"
               style="font-weight:500;line-height:1;font-size:0.85rem;">---</div>
          <small class="text-white-50" id="userRoleDisplay"
                 style="font-size:0.65rem;text-transform:uppercase;">Role</small>
        </div>
        <div class="user-initials" id="userInitials">?</div>
        <button class="btn btn-light btn-sm ms-2 fw-bold custom-logout-btn"
                onclick="logout()">Logout</button>
      </div>

    </div>
  </nav>

  <!-- ── MAIN CONTENT ── -->
  <div id="content">
    <div id="loadingScreen">
      <div class="spinner-border" role="status"></div>
      <p>Loading your portal...</p>
    </div>
    <div id="accessDenied">
      <div style="font-size:3rem;">🔒</div>
      <h4 style="color:#dc3545;">Access Denied</h4>
      <p style="color:#6b7280;">Your session has expired or is invalid.</p>
      <a href="index.html" class="btn btn-primary mt-2">Back to Login</a>
    </div>
  </div>

  <script>
    // ── Supabase ──────────────────────────────────────────────
    const SUPABASE_URL = 'https://ilgfjyokqyoonteqzgbx.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlsZ2ZqeW9rcXlvb250ZXF6Z2J4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIyMDc2NTgsImV4cCI6MjA4Nzc4MzY1OH0.ZWjz-J9J09QjVKFylOIjgXg5ey4Z6rvKU29AM3CQoTQ';
    const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // ── Global session ────────────────────────────────────────
    var userSession = { email: '', role: '', name: '', token: '' };

    // ── Supabase fetch helper ─────────────────────────────────
    async function sbFetch(path, opts = {}) {
      try {
        const res = await fetch(SUPABASE_URL + '/rest/v1/' + path, {
          method: opts.method || 'GET',
          headers: {
            'apikey':        SUPABASE_KEY,
            'Authorization': 'Bearer ' + SUPABASE_KEY,
            'Content-Type':  'application/json',
            'Prefer':        opts.prefer || '',
            ...(opts.headers || {})
          },
          body: opts.body ? JSON.stringify(opts.body) : undefined
        });
        if (!res.ok) { console.error('sbFetch error', res.status); return null; }
        const text = await res.text();
        return text ? JSON.parse(text) : [];
      } catch(e) { console.error('sbFetch failed:', e); return null; }
    }

    // ── Logout ────────────────────────────────────────────────
    function logout() {
      Swal.fire({
        title: 'Logging out...',
        text: 'Are you sure you want to log out?',
        icon: 'question',
        showCancelButton: true,
        confirmButtonColor: '#dc3545',
        cancelButtonColor: '#6c757d',
        confirmButtonText: 'Yes, logout'
      }).then(function(result) {
        if (result.isConfirmed) {
          sessionStorage.removeItem('pce_session');
          window.location.href = 'index.html';
        }
      });
    }

    // ── UI loader ─────────────────────────────────────────────
    // Maps each role to its HTML file
    const ROLE_PAGES = {
      'FINANCE':    'finance.html',
      'REGISTRY':   'registry.html',
      'STUDENT':    'student.html',
      'ASSESSMENT': 'assessment.html',
      'HOD':        'hod.html',
      'ADMIN':      'admin.html'
    };

    async function loadRoleUI(role) {
      const page = ROLE_PAGES[role];
      if (!page) {
        showAccessDenied();
        return;
      }
      try {
        const res  = await fetch(page);
        const html = await res.text();
        document.getElementById('content').innerHTML = html;
      } catch(e) {
        // Page not built yet — show friendly message
        document.getElementById('content').innerHTML = `
          <div style="display:flex;flex-direction:column;align-items:center;
                      justify-content:center;min-height:calc(100vh - 62px);
                      gap:12px;text-align:center;padding:40px;">
            <div style="font-size:3rem;">🚧</div>
            <h4 style="color:#0d6efd;">${role} Portal</h4>
            <p style="color:#6b7280;">This module is being set up.<br>
               Check back shortly.</p>
          </div>`;
      }
    }

    function showAccessDenied() {
      document.getElementById('loadingScreen').style.display = 'none';
      document.getElementById('accessDenied').style.display  = 'flex';
    }

    // ── Init ──────────────────────────────────────────────────
    window.addEventListener('DOMContentLoaded', async function() {
      // 1. Read session
      const raw = sessionStorage.getItem('pce_session');
      if (!raw) { showAccessDenied(); return; }

      let session;
      try { session = JSON.parse(raw); } catch(e) { showAccessDenied(); return; }

      if (!session.email || !session.role) { showAccessDenied(); return; }

      // 2. Populate global session
      userSession.email = session.email;
      userSession.role  = session.role;

      // 3. Update navbar
      document.getElementById('userRoleDisplay').innerText = session.role;

      // 4. Load student name
      try {
        const rows = await sbFetch(
          'student_bio?email=eq.' + encodeURIComponent(session.email) +
          '&select=name&limit=1'
        );
        if (rows && rows.length > 0 && rows[0].name) {
          userSession.name = rows[0].name;
          document.getElementById('userNameDisplay').innerText = rows[0].name;
          document.getElementById('userInitials').innerText =
            rows[0].name.charAt(0).toUpperCase();
        } else {
          // For staff roles not in student_bio, show email prefix
          const nameFromEmail = session.email.split('@')[0];
          document.getElementById('userNameDisplay').innerText = nameFromEmail;
          document.getElementById('userInitials').innerText =
            nameFromEmail.charAt(0).toUpperCase();
        }
      } catch(e) {
        document.getElementById('userNameDisplay').innerText = session.email;
      }

      // 5. Load the correct UI for this role
      await loadRoleUI(session.role);
    });
  </script>

</body>
</html>
