<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PCE Portal</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #f8fafc; font-family: 'Segoe UI', sans-serif; overflow-x: hidden; min-height: 100vh; }
    .user-profile-corner { display: flex; align-items: center; gap: 10px; }
    .user-initials {
      background: white !important; color: #0d6efd !important;
      width: 35px; height: 35px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-weight: bold; border: 1px solid rgba(0,0,0,0.1); flex-shrink: 0;
    }
    .custom-logout-btn {
      background-color: white !important; color: #dc3545 !important;
      border: 1px solid #dc3545 !important; transition: all 0.3s ease;
    }
    .custom-logout-btn:hover {
      background-color: #dc3545 !important; color: white !important;
      box-shadow: 0 4px 8px rgba(0,0,0,0.2);
    }
    #content { width: 100%; min-height: calc(100vh - 62px); }
    #loadingScreen {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; min-height: calc(100vh - 62px); gap: 16px;
    }
    #loadingScreen .spinner-border { width: 3rem; height: 3rem; color: #0d6efd; }
    #loadingScreen p { color: #6b7280; font-size: 0.95rem; }
    #accessDenied {
      display: none; flex-direction: column; align-items: center;
      justify-content: center; min-height: calc(100vh - 62px);
      gap: 12px; text-align: center; padding: 40px;
    }
  </style>
</head>
<body>

<!-- ONE navbar for the entire app -->
<nav class="navbar navbar-dark bg-primary" style="border-bottom:3px solid #0a58ca;">
  <div class="container-fluid px-3 px-sm-4">
    <a class="navbar-brand d-flex align-items-center" href="#" style="gap:10px;max-width:70%;">
      <img src="https://pce.edu.gh/newimg/logo.png" alt="PCE" width="38" height="38"
           style="background:white;padding:2px;border-radius:4px;flex-shrink:0;">
      <div class="d-flex flex-column" style="line-height:1.1;overflow:hidden;">
        <span class="fw-bold d-none d-sm-inline" style="font-size:0.9rem;">PRESBYTERIAN COLLEGE OF EDUCATION</span>
        <span class="fw-bold d-inline d-sm-none" style="font-size:0.85rem;">PCE AKROPONG</span>
        <small class="text-white-50" style="font-size:0.7rem;">AKROPONG-AKUAPEM</small>
      </div>
    </a>
    <div class="user-profile-corner">
      <div class="text-end d-none d-sm-block">
        <div id="userNameDisplay" class="text-white" style="font-weight:500;line-height:1;font-size:0.85rem;">---</div>
        <small class="text-white-50" id="userRoleDisplay" style="font-size:0.65rem;text-transform:uppercase;">Role</small>
      </div>
      <div class="user-initials" id="userInitials">?</div>
      <button class="btn btn-light btn-sm ms-2 fw-bold custom-logout-btn" onclick="logout()">Logout</button>
    </div>
  </div>
</nav>

<!-- Role UI fragments are injected here -->
<div id="content">
  <div id="loadingScreen">
    <div class="spinner-border" role="status"></div>
    <p>Loading your portal...</p>
  </div>
  <div id="accessDenied">
    <div style="font-size:3rem;">🔒</div>
    <h4 style="color:#dc3545;">Access Denied</h4>
    <p style="color:#6b7280;">Your session has expired or is invalid.</p>
    <a href="index.html" class="btn btn-primary mt-2">Back to Login</a>
  </div>
</div>

<script>
  let SUPABASE_URL = '';
let SUPABASE_KEY = '';
let db           = null;


async function loadConfig() {
  try {
    const res  = await fetch('/api/config');
    if (!res.ok) throw new Error('Config fetch failed');
    const conf   = await res.json();
    SUPABASE_URL = conf.supabaseUrl;
    SUPABASE_KEY = conf.supabaseKey;
    // Create ONE client and reuse it for both db and _supabaseClient
    // This eliminates the "Multiple GoTrueClient instances" warning
    db  = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    
  } catch (e) {
    console.error('Config load failed:', e);
    document.body.innerHTML =
      '<div style="display:flex;flex-direction:column;align-items:center;' +
      'justify-content:center;height:100vh;font-family:sans-serif;gap:16px;">' +
      '<div style="font-size:3rem;">⚠️</div>' +
      '<h3 style="color:#dc2626;margin:0;">System Unavailable</h3>' +
      '<p style="color:#6b7280;margin:0;">Please refresh the page or try again later.</p>' +
      '</div>';
  }
}

  // Global session — role fragments read this
  var userSession = { email: '', role: '', name: '' };

  // Shared Supabase helper — available to all role fragments
  async function sbFetch(path, opts = {}) {
    try {
      const res = await fetch(SUPABASE_URL + '/rest/v1/' + path, {
        method: opts.method || 'GET',
        headers: {
          'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY,
          'Content-Type': 'application/json', ...(opts.prefer ? { 'Prefer': opts.prefer } : {}),
          ...(opts.headers || {})
        },
        body: opts.body ? JSON.stringify(opts.body) : undefined
      });
      if (!res.ok) { console.error('sbFetch', res.status, await res.text()); return null; }
      const t = await res.text();
      return t ? JSON.parse(t) : [];
    } catch(e) { console.error('sbFetch failed:', e); return null; }
  }

  // Shared logout — called by role fragments too
  async function logout() {
  Swal.fire({
    title: 'Logging out?', icon: 'question', showCancelButton: true,
    confirmButtonColor: '#dc3545', confirmButtonText: 'Yes, logout'
  }).then(async r => {
    if (r.isConfirmed) {
      // Delete the session token from Supabase
      const raw = sessionStorage.getItem('pce_session');
      if (raw) {
        try {
          const session = JSON.parse(raw);
          if (session.token) {
            await fetch(SUPABASE_URL + '/rest/v1/sessions?token=eq.' + encodeURIComponent(session.token), {
              method: 'DELETE',
              headers: {
                'apikey': SUPABASE_KEY,
                'Authorization': 'Bearer ' + SUPABASE_KEY
              }
            });
          }
        } catch(e) {
          // Silent fail — still log out even if token cleanup fails
          console.warn('Session cleanup failed:', e);
        }
      }
      sessionStorage.removeItem('pce_session');
      window.location.href = 'index.html';
    }
  });
}

  function pceApplyPermissions(permissionsJson) {
    var allowed;
    try {
      allowed = typeof permissionsJson === 'string'
        ? JSON.parse(permissionsJson)
        : permissionsJson;
    } catch(e) {
      // Malformed permissions — fail open (show everything)
      console.warn('PCE: Could not parse permissions, showing all sections.');
      return;
    }

    if (!Array.isArray(allowed) || allowed.length === 0) return;

    var allowedSet = new Set(allowed);

    // ── Registry sidebar ──────────────────────────────────────
    var regMenu = document.getElementById('regSidebarMenu');
    if (regMenu) {
      regMenu.querySelectorAll('[data-section]').forEach(function(item) {
        var sectionId = item.getAttribute('data-section');
        if (!allowedSet.has(sectionId)) {
          item.style.display = 'none';
        }
      });

      // Auto-navigate to the first permitted section
      var firstAllowed = allowed.find(function(id) {
        return document.getElementById(id);
      });
      if (firstAllowed && typeof regShowSection === 'function') {
        regShowSection(firstAllowed);
      }
    }

    // ── Finance sidebar ───────────────────────────────────────
    var finMenu = document.getElementById('finSidebarMenu');
    if (finMenu) {
      finMenu.querySelectorAll('[data-section]').forEach(function(item) {
        var sectionId = item.getAttribute('data-section');
        if (!allowedSet.has(sectionId)) {
          item.style.display = 'none';
        }
      });

      // Auto-navigate to the first permitted section
      var firstFinAllowed = allowed.find(function(id) {
        return document.getElementById(id);
      });
      if (firstFinAllowed && typeof finShowSection === 'function') {
        finShowSection(firstFinAllowed);
      }
    }
  }


  function showAccessDenied() {
    document.getElementById('loadingScreen').style.display = 'none';
    document.getElementById('accessDenied').style.display  = 'flex';
  }

  // Fetch a role HTML fragment and inject it — re-executing its scripts properly
  async function loadRoleUI(role) {
    const pages = {
      'FINANCE':    'finance.html',
      'REGISTRY':   'registry.html',
      'STUDENT':    'student.html',
      'ASSESSMENT': 'assessment.html',
      'HOD':        'hod.html',
      'ADMIN':      'admin.html'
    };
    const page = pages[role];
    if (!page) { showAccessDenied(); return; }

    try {
      const html    = await fetch(page).then(r => r.text());
      const content = document.getElementById('content');
      content.innerHTML = html;

      // innerHTML does NOT execute scripts — we must re-run them manually
      // Remove any previously injected role scripts first
document.querySelectorAll('script[data-role-script]').forEach(s => s.remove());

content.querySelectorAll('script').forEach(old => {
        const s = document.createElement('script');
        Array.from(old.attributes).forEach(a => s.setAttribute(a.name, a.value));
        s.textContent = old.textContent;
        s.dataset.roleScript = 'true';
        document.body.appendChild(s);
        old.remove();
      });

      // Also move any <style> tags inside the fragment to <head>
      content.querySelectorAll('style').forEach(old => {
        document.head.appendChild(old.cloneNode(true));
        old.remove();
      });

    } catch(e) {
      document.getElementById('content').innerHTML = `
        <div style="display:flex;flex-direction:column;align-items:center;
                    justify-content:center;min-height:calc(100vh - 62px);
                    gap:12px;text-align:center;padding:40px;">
          <div style="font-size:3rem;">🚧</div>
          <h4 style="color:#0d6efd;">${role} Portal</h4>
          <p style="color:#6b7280;">This module is being set up. Check back shortly.</p>
        </div>`;
    }
  }

  window.addEventListener('DOMContentLoaded', async function () {
  await loadConfig();
  const raw = sessionStorage.getItem('pce_session');
  if (!raw) { showAccessDenied(); return; }
    let session;
    try { session = JSON.parse(raw); } catch(e) { showAccessDenied(); return; }
   if (!session.email || !session.role || !session.token) { showAccessDenied(); return; }

const tokenCheck = await sbFetch('sessions?token=eq.' + encodeURIComponent(session.token) + '&select=email,role,expires_at&limit=1');
if (!tokenCheck || tokenCheck.length === 0) { showAccessDenied(); return; }
if (tokenCheck[0].expires_at && new Date(tokenCheck[0].expires_at) < new Date()) {
  showAccessDenied(); return;
}


    userSession.email = session.email;
    userSession.role  = session.role;
    document.getElementById('userRoleDisplay').innerText = session.role;

   try {
      let name = session.email.split('@')[0];
      if (session.role === 'STUDENT') {
        const rows = await sbFetch('student_bio?email=eq.' + encodeURIComponent(session.email) + '&select=name&limit=1');
        if (rows && rows.length > 0 && rows[0].name) name = rows[0].name;
      } else {
        const rows = await sbFetch('users?email=eq.' + encodeURIComponent(session.email) + '&select=name&limit=1');
        if (rows && rows.length > 0 && rows[0].name) name = rows[0].name;
      }
      userSession.name = name;
      document.getElementById('userNameDisplay').innerText = name;
      document.getElementById('userInitials').innerText    = name.charAt(0).toUpperCase();
    } catch(e) {
      const f = session.email.split('@')[0];
      document.getElementById('userNameDisplay').innerText = f;
      document.getElementById('userInitials').innerText    = f.charAt(0).toUpperCase();
    }

    await loadRoleUI(session.role);
if (session.role !== 'ADMIN' && session.permissions) {
  setTimeout(function() {
    pceApplyPermissions(session.permissions);
  }, 300);
}
  });


  
</script>
</body>
</html>
